<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style type="text/css" media="screen">
    html {
      overflow-y:scroll;
    } 
    body {
      margin:0; padding:0; 
      font:12px "Microsoft Yahei",sans-serif;
      background:#fff;
      color:#000;
    } 
    div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,form,fieldset,input,textarea,p {
      padding:0; margin:0;
    } 
    table,td,tr,th {
      font-size:12px;
    } 
    li { 
      list-style-type:none; 
    } 
    img {
      vertical-align: top;
      border: 0;
      border: 0 none;
    } 
    ol,ul {
      list-style:none !inportant;
    } 
    h1,h2,h3,h4,h5,h6 { 
      font-weight:normal;
    } 
    table {
      border-collapse:collapse;
      border-spacing:0;
    }
    em,strong,u,i {
      font-style:normal;
      font-weight:normal;
    }
    input {
      border:none;
    }
  </style>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
  <link href="//netdna.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
  {# 这部分可以作为模板，其他文件可以替换 block #}
  {% block mainbody %}
    <p>original这部分可以被取代，如果子类中没有传入，显示原始内容</p>
  {% endblock %}
</body>
<script type="text/javascript">
  window.app = {
    config: {
      mediaUrl: '{{ MEDIA_URL }}',
      logoPath: '{{ logo_path }}',
      logoWidth: '{{ logo_width }}',
      logoHeight: '{{ logo_height }}',
      siteTitle: '{{ site_title }}',
      siteName: '{{ site_name }}',
      siteRoot: '{{ SITE_ROOT }}',
    },
    pageOptions: {
      csrfToken: "{{ csrf_token }}",
    }
   };
</script>
</html>
