<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style type="text/css" media="screen">
    * {
      margin: 0;
      padding: 0;
    }
    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #root img {
      width: 100%;
      height: 100%;
    }
    #root #date {
      background-color: white;
      width: 200px;
      position: absolute;
      top: 74px;
      left: 88px;
      height: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #root #date div {
      text-align: center;
      color: #666;
    }
    #root #green-code {
      background-color: white;
      width: 220px;
      height: 50px;
      position: absolute;
      top: 376px;
      left: 95px;
    }
    #root #top {
      position: absolute;
      top: 129px;
      left: -91px;
      width: auto;
      height: auto;
      transform: scale(0.35);
    }
    #root #bottom {
      position: absolute;
      top: 338px;
      left: -87px;
      width: auto;
      height: auto;
      transform: scale(0.35);
    }
    #root #left {
      position: absolute;
      transform: rotate(90deg) scale(0.35);
      top: 230px;
      left: 26px;
      width: auto;
      height: auto;
    }
    #root #right {
      position: absolute;
      transform: rotate(90deg) scale(0.35);
      top: 220px;
      left: -182px;
      width: auto;
      height: auto;
    }
    #root #date1 {
      background-color: #fff;
      color: #666;
      position: absolute;
      top: 663px;
      left: 266px;
      padding-right: 5px;
    }
    #root #date2 {
      background-color: #fff;
      color: rgb(185, 45, 38);
      position: absolute;
      top: 697px;
      left: 264px;
    }
  </style>
</head>
<body>
  <div id="root">
    <img src="./001.jpeg" alt="">
    <div id="date">
      <!-- 01 时间 -->
      <div id="date-day">2022年7月20日</div>
      <div id="date-hour">10:00:00</div>
    </div>
    <!-- 02 图片周边会转圈 -->
    <img id="top" src="./top.jpeg"></img>
    <img id="bottom" src="./top.jpeg"></img>
    <img id="left" src="./top.jpeg"></img>
    <img id="right" src="./top.jpeg"></img>
    <!-- 03 下面未见异常，用白色的遮挡实现 -->
    <div id="green-code"></div>
    <!-- 04 查询时间和失效时间 -->
    <div id="date1"></div>
    <div id="date2"></div>
  </div>
  <script>
    // 01 时间
    let day = document.getElementById('date-day');
    let hour = document.getElementById('date-hour');
    setInterval(() => {
      let date = new Date();
      day.innerText = '2022年7月' + date.getDate() + '日';
      hour.innerText = String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0') + ':' + String(date.getSeconds()).padStart(2,'0');
    }, 1000);

    // 03未见异常动画显示
    let code = document.getElementById('green-code');
    setInterval(() => {
      if (code.style.opacity == 0) {
        code.style.opacity = 1;
      } else {
        code.style.opacity = 0;
      }
    }, 500);

    // // 四个点的动画效果
    let topDot = document.getElementById('top');
    setInterval(() => {
      if (topDot.style.marginLeft == '10px') {
        topDot.style.marginLeft = '0px';
      } else {
        topDot.style.marginLeft = '10px';
      }
    }, 500);

    let dot2 = document.getElementById('bottom');
    setInterval(() => {
      if (dot2.style.marginLeft == '10px') {
        dot2.style.marginLeft = '0px';
      } else {
        dot2.style.marginLeft = '10px';
      }
    }, 500);

    let dot3 = document.getElementById('left');
    setInterval(() => {
      if (dot3.style.marginTop == '10px') {
        dot3.style.marginTop = '0px';
      } else {
        dot3.style.marginTop = '10px';
      }
    }, 500);

    let dot4 = document.getElementById('right');
    setInterval(() => {
      if (dot4.style.marginTop == '10px') {
        dot4.style.marginTop = '0px';
      } else {
        dot4.style.marginTop = '10px';
      }
    }, 500);

    // 04 底部时间
    let date1 = document.getElementById('date1');
    let date2 = document.getElementById('date2');
    let date = new Date();
    date1.innerText = '07-' + date.getDate() + '  ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0') + '';
    date2.innerText = '07-' + date.getDate() + '  24:00';
  </script>
</body>
</html>
